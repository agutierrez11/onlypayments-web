<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATAM Fintech Satellite 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020408;
      overflow: hidden;
      font-family: 'Orbitron', 'Rajdhani', system-ui, sans-serif;
      width: 100vw;
      height: 100vh;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas { display: block; }
    
    /* HUD Overlay */
    .hud {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }
    .hud-top-left {
      top: 20px;
      left: 24px;
    }
    .hud-top-right {
      top: 20px;
      right: 24px;
      display: flex;
      gap: 12px;
    }
    .hud-title {
      font-size: 20px;
      font-weight: 700;
      color: #00f5d4;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(0,245,212,0.4);
    }
    .hud-subtitle {
      font-size: 11px;
      color: #00f5d4;
      opacity: 0.6;
      margin-top: 4px;
      letter-spacing: 2px;
      font-family: 'JetBrains Mono', monospace;
    }
    .hud-panel {
      background: rgba(4,8,20,0.85);
      border: 1px solid rgba(0,245,212,0.15);
      border-radius: 10px;
      padding: 12px 18px;
      text-align: center;
      backdrop-filter: blur(8px);
      min-width: 100px;
    }
    .hud-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }
    .hud-label {
      font-size: 9px;
      color: #6b8a9a;
      letter-spacing: 1.5px;
      margin-top: 3px;
      text-transform: uppercase;
    }
    .hud-accent {
      color: #00f5d4;
      font-size: 18px;
      font-weight: 600;
    }
    
    /* Fallback SVG */
    #fallback-globe {
      display: none;
      width: 100%;
      height: 100%;
    }
    
    /* Loading */
    .loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00f5d4;
      font-size: 12px;
      letter-spacing: 3px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
  <!-- Fuentes con fallback a system-ui si falla la carga -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="canvas-container">
    <div class="loader" id="loader">INICIANDO SATÉLITE...</div>
    
    <!-- HUD -->
    <div class="hud hud-top-left">
      <div class="hud-title">LATAM FINTECH HUB</div>
      <div class="hud-subtitle">● SATELLITE TRACKING — 20 PAÍSES</div>
    </div>
    <div class="hud hud-top-right">
      <div class="hud-panel">
        <div class="hud-value">20</div>
        <div class="hud-label">Países Mapeados</div>
      </div>
      <div class="hud-panel">
        <div class="hud-value">$118.5B</div>
        <div class="hud-label">Volumen Remesas</div>
      </div>
      <div class="hud-panel">
        <div class="hud-accent">PIX + SPEI</div>
        <div class="hud-label">Rieles A2A Core</div>
      </div>
    </div>
    
    <!-- Three.js Canvas -->
    <canvas id="gl-canvas"></canvas>
    
    <!-- Fallback SVG si WebGL falla -->
    <svg id="fallback-globe" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="100%" height="100%" fill="#020408"/>
      <ellipse cx="400" cy="300" rx="200" ry="200" fill="url(#glow)"/>
      <g transform="translate(400,300)">
        <ellipse cx="0" cy="0" rx="180" ry="180" fill="none" stroke="rgba(0,245,212,0.15)" stroke-width="1.5"/>
        <ellipse cx="0" cy="0" rx="180" ry="180" fill="none" stroke="rgba(0,245,212,0.1)" stroke-width="1" transform="scale(1,0.35)"/>
        <ellipse cx="0" cy="0" rx="180" ry="180" fill="none" stroke="rgba(0,245,212,0.1)" stroke-width="1" transform="scale(0.35,1)"/>
        <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="rgba(0,245,212,0.12)" stroke-width="1"/>
        <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="rgba(0,245,212,0.08)" stroke-width="0.8" transform="scale(1,0.35)"/>
        <circle cx="0" cy="0" r="40" fill="#00f5d4" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="20" fill="#fff" opacity="0.9"/>
      </g>
    </svg>
  </div>

  <!-- Three.js desde CDN con fallback local -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============================================
    // LATAM FINTECH HUB - GLOBO 3D SATELITAL
    // Optimizado: WebGL con fallback SVG
    // ============================================
    
    (function() {
      const container = document.getElementById('canvas-container');
      const canvas = document.getElementById('gl-canvas');
      const loader = document.getElementById('loader');
      const fallback = document.getElementById('fallback-globe');
      
      // Detectar soporte WebGL
      function webglAvailable() {
        try {
          const testCanvas = document.createElement('canvas');
          return !!(window.WebGLRenderingContext && 
            (testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl')));
        } catch(e) { return false; }
      }
      
      if (!webglAvailable() || typeof THREE === 'undefined') {
        // Fallback a SVG estático
        canvas.style.display = 'none';
        fallback.style.display = 'block';
        loader.style.display = 'none';
        return;
      }
      
      // ============================================
      // CONFIGURACIÓN THREE.JS
      // ============================================
      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020408, 0.002);
      
      const camera = new THREE.PerspectiveCamera(
        45, 
        window.innerWidth / window.innerHeight, 
        0.1, 
        1000
      );
      camera.position.z = 280;
      camera.position.y = 40;
      
      const renderer = new THREE.WebGLRenderer({ 
        canvas: canvas,
        antialias: true,
        alpha: true,
        powerPreference: 'high-performance'
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x020408, 1);
      
      // ============================================
      // GLOW SHADER (Efecto de núcleo luminoso)
      // ============================================
      const glowVertexShader = `
        uniform vec3 viewVector;
        varying float intensity;
        void main() {
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          vec3 actual_normal = vec3(modelMatrix * vec4(normal, 0.0));
          intensity = pow(0.55 - dot(normalize(viewVector), actual_normal), 4.0);
        }
      `;
      
      const glowFragmentShader = `
        uniform vec3 glowColor;
        varying float intensity;
        void main() {
          vec3 glow = glowColor * intensity;
          gl_FragColor = vec4(glow, 1.0);
        }
      `;
      
      // ============================================
      // GLOBO PRINCIPAL (Wireframe)
      // ============================================
      const globeRadius = 100;
      
      // Geometría del globo - Icosahedron para wireframe limpio
      const globeGeometry = new THREE.IcosahedronGeometry(globeRadius, 3);
      const globeMaterial = new THREE.MeshBasicMaterial({
        color: 0x00f5d4,
        wireframe: true,
        transparent: true,
        opacity: 0.15
      });
      const globe = new THREE.Mesh(globeGeometry, globeMaterial);
      scene.add(globe);
      
      // Segunda capa de wireframe más denso
      const globeGeometry2 = new THREE.IcosahedronGeometry(globeRadius * 0.98, 2);
      const globeMaterial2 = new THREE.MeshBasicMaterial({
        color: 0x00f5d4,
        wireframe: true,
        transparent: true,
        opacity: 0.08
      });
      const globeInner = new THREE.Mesh(globeGeometry2, globeMaterial2);
      scene.add(globeInner);
      
      // ============================================
      // LÍNEAS DE LATITUD (Anillos horizontales)
      // ============================================
      const ringGroup = new THREE.Group();
      const ringCount = 8;
      for (let i = 0; i < ringCount; i++) {
        const phi = (Math.PI * i) / ringCount;
        const ringRadius = globeRadius * Math.sin(phi);
        const ringY = globeRadius * Math.cos(phi);
        
        if (ringRadius > 5) {
          const ringGeo = new THREE.RingGeometry(ringRadius - 0.5, ringRadius + 0.5, 64);
          const ringMat = new THREE.MeshBasicMaterial({
            color: 0x00f5d4,
            transparent: true,
            opacity: 0.06,
            side: THREE.DoubleSide
          });
          const ring = new THREE.Mesh(ringGeo, ringMat);
          ring.position.y = ringY;
          ring.rotation.x = Math.PI / 2;
          ringGroup.add(ring);
          
          // Anillo opuesto (hemisferio sur)
          const ring2 = ring.clone();
          ring2.position.y = -ringY;
          ringGroup.add(ring2);
        }
      }
      scene.add(ringGroup);
      
      // ============================================
      // LÍNEAS DE LONGITUD (Anillos verticales)
      // ============================================
      const meridianGroup = new THREE.Group();
      for (let i = 0; i < 6; i++) {
        const meridianGeo = new THREE.RingGeometry(globeRadius - 0.3, globeRadius + 0.3, 64);
        const meridianMat = new THREE.MeshBasicMaterial({
          color: 0x00f5d4,
          transparent: true,
          opacity: 0.05,
          side: THREE.DoubleSide
        });
        const meridian = new THREE.Mesh(meridianGeo, meridianMat);
        meridian.rotation.y = (Math.PI * i) / 3;
        meridianGroup.add(meridian);
      }
      scene.add(meridianGroup);
      
      // ============================================
      // NÚCLEO LUMINOSO (Glow Shader)
      // ============================================
      const coreGeometry = new THREE.SphereGeometry(globeRadius * 0.35, 32, 32);
      const coreMaterial = new THREE.ShaderMaterial({
        uniforms: {
          glowColor: { value: new THREE.Color(0x00f5d4) },
          viewVector: { value: camera.position }
        },
        vertexShader: glowVertexShader,
        fragmentShader: glowFragmentShader,
        side: THREE.FrontSide,
        blending: THREE.AdditiveBlending,
        transparent: true
      });
      const coreGlow = new THREE.Mesh(coreGeometry, coreMaterial);
      scene.add(coreGlow);
      
      // Núcleo sólido interno
      const coreSolidGeo = new THREE.SphereGeometry(globeRadius * 0.15, 16, 16);
      const coreSolidMat = new THREE.MeshBasicMaterial({
        color: 0x00f5d4,
        transparent: true,
        opacity: 0.9
      });
      const coreSolid = new THREE.Mesh(coreSolidGeo, coreSolidMat);
      scene.add(coreSolid);
      
      // Punto central brillante
      const centerGeo = new THREE.SphereGeometry(globeRadius * 0.06, 8, 8);
      const centerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const centerPoint = new THREE.Mesh(centerGeo, centerMat);
      scene.add(centerPoint);
      
      // ============================================
      // NODOS DE PAÍSES (Puntos en la superficie)
      // ============================================
      const countryNodes = [
        { lat: 19.4, lon: -99.1, name: 'México' },      // CDMX
        { lat: 4.7, lon: -74.0, name: 'Colombia' },      // Bogotá
        { lat: -33.4, lon: -70.7, name: 'Chile' },       // Santiago
        { lat: -34.6, lon: -58.4, name: 'Argentina' },   // Buenos Aires
        { lat: -23.5, lon: -46.6, name: 'Brasil' },      // São Paulo
        { lat: -12.0, lon: -77.0, name: 'Perú' },        // Lima
        { lat: -0.2, lon: -78.5, name: 'Ecuador' },      // Quito
        { lat: 10.5, lon: -66.9, name: 'Venezuela' },    // Caracas
        { lat: -16.5, lon: -68.1, name: 'Bolivia' },     // La Paz
        { lat: -25.3, lon: -57.6, name: 'Paraguay' },    // Asunción
        { lat: -34.9, lon: -56.2, name: 'Uruguay' },     // Montevideo
        { lat: 9.9, lon: -84.0, name: 'Costa Rica' },    // San José
        { lat: 13.7, lon: -89.2, name: 'El Salvador' },  // San Salvador
        { lat: 14.6, lon: -90.5, name: 'Guatemala' },    // Ciudad de Guatemala
        { lat: 12.1, lon: -86.2, name: 'Nicaragua' },    // Managua
        { lat: 8.9, lon: -79.5, name: 'Panamá' },        // Ciudad de Panamá
        { lat: 18.5, lon: -69.9, name: 'Rep. Dominicana' }, // Santo Domingo
        { lat: 23.1, lon: -82.4, name: 'Cuba' },         // La Habana
        { lat: 17.9, lon: -76.8, name: 'Jamaica' },      // Kingston
        { lat: -33.0, lon: -56.0, name: 'Latam Hub' }    // Centro
      ];
      
      const nodeGroup = new THREE.Group();
      const nodeGeometry = new THREE.SphereGeometry(2, 8, 8);
      
      countryNodes.forEach((country, idx) => {
        // Convertir lat/lon a coordenadas 3D
        const phi = (90 - country.lat) * (Math.PI / 180);
        const theta = (country.lon + 180) * (Math.PI / 180);
        const r = globeRadius + 2;
        
        const x = -(r * Math.sin(phi) * Math.cos(theta));
        const z = (r * Math.sin(phi) * Math.sin(theta));
        const y = (r * Math.cos(phi));
        
        const nodeMat = new THREE.MeshBasicMaterial({
          color: 0x00f5d4,
          transparent: true,
          opacity: 0.8
        });
        const node = new THREE.Mesh(nodeGeometry, nodeMat);
        node.position.set(x, y, z);
        
        // Animación de pulso individual
        node.userData = { 
          baseOpacity: 0.6 + Math.random() * 0.4,
          pulseSpeed: 1.5 + Math.random() * 2,
          pulseOffset: Math.random() * Math.PI * 2
        };
        
        nodeGroup.add(node);
      });
      scene.add(nodeGroup);
      
      // ============================================
      // CONEXIONES ENTRE NODOS (Líneas)
      // ============================================
      const connectionGroup = new THREE.Group();
      const lineMaterial = new THREE.LineBasicMaterial({
        color: 0x00f5d4,
        transparent: true,
        opacity: 0.12
      });
      
      // Conectar nodos cercanos
      for (let i = 0; i < countryNodes.length - 1; i++) {
        for (let j = i + 1; j < countryNodes.length; j++) {
          const p1 = nodeGroup.children[i].position;
          const p2 = nodeGroup.children[j].position;
          const dist = p1.distanceTo(p2);
          
          if (dist < globeRadius * 1.3) {
            const points = [p1, p2];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, lineMaterial.clone());
            line.material.opacity = 0.08 + Math.random() * 0.08;
            connectionGroup.add(line);
          }
        }
      }
      scene.add(connectionGroup);
      
      // ============================================
      // PARTÍCULAS ATMOSFÉRICAS
      // ============================================
      const particleCount = 200;
      const particleGeo = new THREE.BufferGeometry();
      const particlePositions = new Float32Array(particleCount * 3);
      const particleSpeeds = [];
      
      for (let i = 0; i < particleCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = globeRadius * (1.1 + Math.random() * 0.4);
        
        particlePositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        particlePositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        particlePositions[i * 3 + 2] = r * Math.cos(phi);
        
        particleSpeeds.push({
          theta: (Math.random() - 0.5) * 0.002,
          phi: (Math.random() - 0.5) * 0.002
        });
      }
      
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      
      const particleMat = new THREE.PointsMaterial({
        color: 0x00f5d4,
        size: 1.5,
        transparent: true,
        opacity: 0.4
      });
      
      const particles = new THREE.Points(particleGeo, particleMat);
      scene.add(particles);
      
      // ============================================
      // LUCES
      // ============================================
      const ambientLight = new THREE.AmbientLight(0x00f5d4, 0.3);
      scene.add(ambientLight);
      
      const pointLight = new THREE.PointLight(0x00f5d4, 1, 400);
      pointLight.position.set(0, 0, 0);
      scene.add(pointLight);
      
      // ============================================
      // ANIMACIÓN
      // ============================================
      let mouseX = 0, mouseY = 0;
      let targetRotationX = 0, targetRotationY = 0;
      
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth / 2) * 0.0003;
        mouseY = (e.clientY - window.innerHeight / 2) * 0.0003;
      });
      
      // Touch support
      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX - window.innerWidth / 2) * 0.0003;
          mouseY = (e.touches[0].clientY - window.innerHeight / 2) * 0.0003;
        }
      });
      
      const clock = new THREE.Clock();
      
      function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        
        // Rotación automática del globo
        globe.rotation.y += 0.001;
        globeInner.rotation.y += 0.0015;
        ringGroup.rotation.y += 0.001;
        meridianGroup.rotation.y += 0.0008;
        
        // Rotación interactiva suave
        targetRotationX += (mouseY - targetRotationX) * 0.05;
        targetRotationY += (mouseX - targetRotationY) * 0.05;
        
        scene.rotation.x = targetRotationX * 0.5;
        scene.rotation.y = targetRotationY * 0.5;
        
        // Pulso de nodos
        nodeGroup.children.forEach((node, i) => {
          const data = node.userData;
          const pulse = Math.sin(time * data.pulseSpeed + data.pulseOffset) * 0.3 + 0.7;
          node.material.opacity = data.baseOpacity * pulse;
          const scale = 1 + pulse * 0.3;
          node.scale.set(scale, scale, scale);
        });
        
        // Update glow shader view vector
        coreMaterial.uniforms.viewVector.value = new THREE.Vector3().subVectors(
          camera.position,
          coreGlow.getWorldPosition(new THREE.Vector3())
        );
        
        // Animar partículas
        const positions = particles.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          const speed = particleSpeeds[i];
          const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
          
          // Rotación orbital sutil
          const x = positions[ix], y = positions[iy], z = positions[iz];
          positions[ix] = x * Math.cos(speed.theta) - z * Math.sin(speed.theta);
          positions[iz] = x * Math.sin(speed.theta) + z * Math.cos(speed.theta);
          positions[iy] = y * Math.cos(speed.phi) - z * Math.sin(speed.phi);
        }
        particles.geometry.attributes.position.needsUpdate = true;
        
        // Pulso del núcleo
        const corePulse = Math.sin(time * 2) * 0.1 + 1;
        coreSolid.scale.set(corePulse, corePulse, corePulse);
        centerPoint.scale.set(corePulse * 0.8, corePulse * 0.8, corePulse * 0.8);
        
        renderer.render(scene, camera);
      }
      
      // ============================================
      // RESIZE HANDLER
      // ============================================
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
      
      // ============================================
      // CONTEXT LOST HANDLER (Crítico para móviles)
      // ============================================
      canvas.addEventListener('webglcontextlost', (e) => {
        e.preventDefault();
        console.warn('WebGL context lost - mostrando fallback');
        canvas.style.display = 'none';
        fallback.style.display = 'block';
      });
      
      canvas.addEventListener('webglcontextrestored', () => {
        console.log('WebGL context restored');
        canvas.style.display = 'block';
        fallback.style.display = 'none';
      });
      
      // Ocultar loader y iniciar
      loader.style.display = 'none';
      animate();
      
      // Cleanup al cerrar
      window.addEventListener('beforeunload', () => {
        globeGeometry.dispose();
        globeMaterial.dispose();
        globeGeometry2.dispose();
        globeMaterial2.dispose();
        coreGeometry.dispose();
        coreMaterial.dispose();
        coreSolidGeo.dispose();
        coreSolidMat.dispose();
        centerGeo.dispose();
        centerMat.dispose();
        nodeGeometry.dispose();
        particleGeo.dispose();
        particleMat.dispose();
        renderer.dispose();
      });
      
    })();
  </script>
</body>
</html>
